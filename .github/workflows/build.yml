name: Build

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.17
            asset: fakeroost-x86_64-linux-gnu
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            build_target: x86_64-unknown-linux-musl
            asset: fakeroost-x86_64-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.17
            asset: fakeroost-aarch64-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            build_target: aarch64-unknown-linux-musl
            asset: fakeroost-aarch64-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.build_target }}

      - name: Build
        run: cargo zigbuild --release --locked --target ${{ matrix.build_target }}

      - name: Collect binary
        run: cp "target/${{ matrix.target }}/release/fakeroost" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
