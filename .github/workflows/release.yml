name: Release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-plz:
    name: release-plz
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases: ${{ steps.release-plz.outputs.releases }}
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - id: release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build (${{ matrix.build_target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build_target: x86_64-unknown-linux-gnu.2.17
            asset: fakeroost-x86_64-linux-gnu
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            build_target: x86_64-unknown-linux-musl
            asset: fakeroost-x86_64-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build_target: aarch64-unknown-linux-gnu.2.17
            asset: fakeroost-aarch64-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            build_target: aarch64-unknown-linux-musl
            asset: fakeroost-aarch64-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.build_target }}

      - name: Build
        run: cargo zigbuild --release --locked --target ${{ matrix.build_target }}

      - name: Collect binary
        run: cp "target/${{ matrix.target }}/release/fakeroost" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: [release-plz, build]
    if: github.event_name == 'push' && needs.release-plz.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: fakeroost-*
          merge-multiple: true

      - name: Upload assets and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ fromJson(needs.release-plz.outputs.releases)[0].tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" fakeroost-* --clobber
          gh release edit "$TAG" --draft=false
